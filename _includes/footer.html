<!-- Antigravity IDE Status Bar -->
<footer id="antigravity-status-bar" class="antigravity-status-bar">
  <div class="status-item status-token">
    <span class="status-icon">🎟️</span>
    <span class="status-label">토큰 사용량:</span>
    <span class="status-value">8,420 / 10,000 (15.8% 잔여)</span>
  </div>
  
  <div class="status-item status-reset">
    <span class="status-icon">🕒</span>
    <span class="status-label">재생성 대기:</span>
    <span id="token-timer" class="status-value">45분 12초 남음</span>
  </div>

  <div class="status-item status-trend">
    <span class="pulse-dot"></span>
    <span class="status-label">주간 사용량:</span>
    <span class="status-value">월 65% | 화 72% | 수 80% | 목 85% | 금 84.2%</span>
  </div>
</footer>

<script>
  (function() {
    let secondsLeft = 45 * 60 + 12; // 45분 12초
    const timerEl = document.getElementById('token-timer');
    if (timerEl) {
      const interval = setInterval(() => {
        secondsLeft--;
        if (secondsLeft <= 0) {
          secondsLeft = 60 * 60; // 1시간 리셋
        }
        const mins = Math.floor(secondsLeft / 60);
        const secs = secondsLeft % 60;
        timerEl.textContent = `${mins}분 ${secs}초 남음`;
      }, 1000);
    }
  })();
</script>
